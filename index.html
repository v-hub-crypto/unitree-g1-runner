<body>
<canvas id="game" width="800" height="400"></canvas>
<script src="https://sdk.play.fun"></script>
<script>
const canvas = document.getElementById('game');
const ctx    = canvas.getContext('2d');
const AC     = new (window.AudioContext||window.webkitAudioContext)();

// ═══════════════════════════════════════════════════════
//  BIOMES  (3 мира с уникальными цветами и атмосферой)
// ═══════════════════════════════════════════════════════
const BIOMES = {
  cyber: {
    name:'КИБЕРПОЛИС',
    sky:   ['#050510','#0d0d2b','#1a0a2e'],
    grid:  'rgba(0,255,159,0.12)',
    glow1: '#00FF9F', glow2: '#FF00FF',
    winA:  'rgba(0,255,255,0.55)', winB: 'rgba(180,100,255,0.4)', winC:'rgba(100,150,255,0.25)',
    obsCol:'#1a0030', obsGlow:'#FF00FF',
    droneCol:'#001a2e', droneGlow:'#00FFFF',
    groundLine:'#00FF9F',
    accent:'#00FF9F',
  },
  factory: {
    name:'ЗАВОД',
    sky:   ['#0d0700','#1a0e00','#2a1500'],
    grid:  'rgba(255,120,0,0.1)',
    glow1: '#FF6600', glow2: '#FF2200',
    winA:  'rgba(255,150,0,0.55)', winB: 'rgba(255,80,0,0.4)', winC:'rgba(200,60,0,0.25)',
    obsCol:'#1a0800', obsGlow:'#FF4400',
    droneCol:'#1a0500', droneGlow:'#FF8800',
    groundLine:'#FF6600',
    accent:'#FF6600',
  },
  space: {
    name:'КОСМОС',
    sky:   ['#000005','#050015','#000020'],
    grid:  'rgba(180,0,255,0.1)',
    glow1: '#CC00FF', glow2: '#0088FF',
    winA:  'rgba(180,0,255,0.5)', winB: 'rgba(80,0,200,0.4)', winC:'rgba(40,0,150,0.25)',
    obsCol:'#0a001a', obsGlow:'#CC00FF',
    droneCol:'#000a1a', droneGlow:'#0088FF',
    groundLine:'#CC00FF',
    accent:'#CC00FF',
  }
};
const BIOME_ORDER = ['cyber','factory','space'];
const BIOME_DIST  = 600; // метров на биом

// ═══════════════════════════════════════════════════════
//  SOUND
// ═══════════════════════════════════════════════════════
function snd(type,pitchMult=1){
  try{
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);
    const C={
      jump:   {f:680,  gv:.22, t:'sine',     d:.13},
      collect:{f:960,  gv:.3,  t:'sine',     d:.11},
      combo:  {f:1200, gv:.28, t:'triangle', d:.18},
      shield: {f:440,  gv:.28, t:'triangle', d:.3},
      death:  {f:180,  gv:.4,  t:'sawtooth', d:.6},
      pause:  {f:320,  gv:.18, t:'sine',     d:.1},
      boost:  {f:280,  gv:.3,  t:'sawtooth', d:.25},
      boss:   {f:120,  gv:.45, t:'sawtooth', d:.8},
      hit:    {f:220,  gv:.35, t:'sawtooth', d:.35},
      biome:  {f:520,  gv:.25, t:'triangle', d:.5},
    }[type]||{f:500,gv:.2,t:'sine',d:.1};
    o.type=C.t;
    o.frequency.setValueAtTime(C.f*pitchMult,AC.currentTime);
    g.gain.setValueAtTime(C.gv,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+C.d);
    o.start();o.stop(AC.currentTime+C.d);
  }catch(e){}
}

// ═══════════════════════════════════════════════════════
//  LEADERBOARD  (localStorage, топ-5)
// ═══════════════════════════════════════════════════════
const LB = {
  KEY: 'g1runner_lb',
  load(){ try{return JSON.parse(localStorage.getItem(this.KEY))||[];}catch{return[];} },
  save(scores){ try{localStorage.setItem(this.KEY,JSON.stringify(scores));}catch{} },
  add(dist){
    const s=this.load();
    s.push({d:dist,ts:Date.now()});
    s.sort((a,b)=>b.d-a.d);
    const top=s.slice(0,5);
    this.save(top);
    return top.findIndex(e=>e.ts===s[0].ts); // позиция нового рекорда
  },
  top(){ return this.load(); },
  best(){ const s=this.load(); return s.length?s[0].d:0; }
};

// ═══════════════════════════════════════════════════════
//  PARALLAX BG  (биомо-зависимый)
// ═══════════════════════════════════════════════════════
class ParallaxBg {
  constructor(){
    this.stars=Array.from({length:100},()=>({
      x:Math.random()*800,y:Math.random()*220,
      r:Math.random()*1.6+.3,al:Math.random()*.6+.2
    }));
    this.layers=[
      {speed:.5,  blds:this._gen(12,180,260)},
      {speed:1.2, blds:this._gen(9, 100,160)},
      {speed:2.5, blds:this._gen(7,  60,100)},
    ];
    this.gridOff=0;
    this.biomeKey='cyber';
    this.transAlpha=0; // 0..1 для перехода между биомами
    this.fromBiome='cyber';
    this.toBiome='cyber';
    this.transitioning=false;
  }
  _gen(n,minH,maxH){
    const items=[];let x=0;
    for(let i=0;i<n*2;i++){
      const w=55+Math.random()*90,h=minH+Math.random()*(maxH-minH);
      const wins=[];
      for(let wy=10;wy<h-10;wy+=18)
        for(let wx=8;wx<w-8;wx+=14)
          if(Math.random()>.45)wins.push({x:wx,y:wy});
      items.push({x,w,h,wins,ant:w>80&&Math.random()>.5});
      x+=w+4+Math.random()*20;
    }
    return items;
  }
  startTransition(to){
    this.fromBiome=this.biomeKey;
    this.toBiome=to;
    this.transitioning=true;
    this.transAlpha=0;
  }
  update(speed){
    this.gridOff=(this.gridOff+speed*.5)%40;
    this.layers.forEach(l=>{
      const tw=l.blds.reduce((s,b)=>s+b.w+4,0);
      l.blds.forEach(b=>{b.x-=l.speed*(speed/4.5);if(b.x+b.w<-10)b.x+=tw;});
    });
    if(this.transitioning){
      this.transAlpha+=.018;
      if(this.transAlpha>=1){this.transAlpha=1;this.biomeKey=this.toBiome;this.transitioning=false;}
    }
  }
  _drawBiomeBg(key,alpha=1){
    const B=BIOMES[key];
    const sky=ctx.createLinearGradient(0,0,0,400);
    sky.addColorStop(0,B.sky[0]);sky.addColorStop(.6,B.sky[1]);sky.addColorStop(1,B.sky[2]);
    ctx.globalAlpha=alpha;
    ctx.fillStyle=sky;ctx.fillRect(0,0,800,400);
    // Stars
    const t=Date.now()/800;
    this.stars.forEach(s=>{
      ctx.globalAlpha=alpha*s.al*(0.7+0.3*Math.sin(t+s.x));
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();
    });
    ctx.globalAlpha=alpha;
    // Buildings
    this.layers.forEach((l,li)=>{
      l.blds.forEach(b=>{
        const gy=382,by=gy-b.h;
        ctx.fillStyle=li===0?'#0d1433':li===1?'#12204a':'#1a2d5a';
        // Tint по биому
        ctx.fillStyle=li===0?B.sky[0]:li===1?B.sky[1]:B.sky[2];
        ctx.fillRect(b.x,by,b.w,b.h);
        b.wins.forEach(w=>{
          const f=Math.random()>.999;
          ctx.fillStyle=f?'#fff':(li===2?B.winA:li===1?B.winB:B.winC);
          ctx.fillRect(b.x+w.x,by+w.y,6,8);
        });
        if(b.ant){
          ctx.strokeStyle=B.glow2+'cc';ctx.lineWidth=1.5;
          ctx.beginPath();ctx.moveTo(b.x+b.w/2,by);ctx.lineTo(b.x+b.w/2,by-22);ctx.stroke();
          const p=.5+.5*Math.sin(Date.now()/400+b.x);
          ctx.fillStyle=B.glow2;ctx.shadowColor=B.glow2;ctx.shadowBlur=8;
          ctx.beginPath();ctx.arc(b.x+b.w/2,by-24,3,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
        }
      });
    });
    // Grid
    ctx.strokeStyle=B.grid;ctx.lineWidth=1;
    for(let x=-this.gridOff;x<800;x+=40){ctx.beginPath();ctx.moveTo(x,382);ctx.lineTo(x-60,400);ctx.stroke();}
    for(let i=0;i<4;i++){ctx.beginPath();ctx.moveTo(0,382+i*6);ctx.lineTo(800,382+i*6);ctx.stroke();}
    // Ground line
    const gl=ctx.createLinearGradient(0,0,800,0);
    gl.addColorStop(0,'transparent');gl.addColorStop(.15,B.groundLine);
    gl.addColorStop(.85,B.groundLine);gl.addColorStop(1,'transparent');
    ctx.strokeStyle=gl;ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(0,382);ctx.lineTo(800,382);ctx.stroke();
    ctx.globalAlpha=1;
  }
  draw(){
    if(this.transitioning){
      this._drawBiomeBg(this.fromBiome,1);
      this._drawBiomeBg(this.toBiome,this.transAlpha);
    } else {
      this._drawBiomeBg(this.biomeKey,1);
    }
  }
}

// ═══════════════════════════════════════════════════════
//  PARTICLES
// ═══════════════════════════════════════════════════════
class Particles{
  constructor(){this.list=[];}
  emit(x,y,type,cols){
    const C={
      jump:   {n:8,  cols:cols||['#00FF9F','#00ccff'],vx:[-1.5,1.5],vy:[-4,-1],life:25,r:[2,4]},
      collect:{n:14, cols:cols||['#FFD700','#FFA500','#fff'],vx:[-3,3],vy:[-5,-1],life:35,r:[2,5]},
      death:  {n:30, cols:cols||['#FF00FF','#ff0055','#fff'],vx:[-5,5],vy:[-7,2],life:55,r:[2,6]},
      shield: {n:18, cols:['#00FFFF','#fff'],vx:[-2.5,2.5],vy:[-4,1],life:32,r:[2,5]},
      land:   {n:6,  cols:cols||['#00FF9F'],vx:[-2,2],vy:[-2,0],life:18,r:[1,3]},
      combo:  {n:16, cols:['#FFD700','#FF00FF','#00FFFF'],vx:[-4,4],vy:[-6,-2],life:42,r:[3,6]},
      boost:  {n:20, cols:['#FF6600','#FFAA00','#fff'],vx:[-6,6],vy:[-8,2],life:40,r:[3,7]},
      boss:   {n:22, cols:['#FF0000','#FF4400','#FF8800'],vx:[-4,4],vy:[-6,2],life:50,r:[3,8]},
      spark:  {n:10, cols:cols||['#fff','#FFD700'],vx:[-3,3],vy:[-5,-1],life:20,r:[1,3]},
    }[type]||{n:8,cols:['#fff'],vx:[-2,2],vy:[-3,0],life:25,r:[2,4]};
    for(let i=0;i<C.n;i++){
      this.list.push({
        x,y,
        vx:C.vx[0]+Math.random()*(C.vx[1]-C.vx[0]),
        vy:C.vy[0]+Math.random()*(C.vy[1]-C.vy[0]),
        life:C.life,maxLife:C.life,
        r:C.r[0]+Math.random()*(C.r[1]-C.r[0]),
        color:C.cols[Math.floor(Math.random()*C.cols.length)]
      });
    }
  }
  update(){
    for(let i=this.list.length-1;i>=0;i--){
      const p=this.list[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.2;p.life--;
      if(p.life<=0)this.list.splice(i,1);
    }
  }
  draw(){
    this.list.forEach(p=>{
      ctx.globalAlpha=p.life/p.maxLife;
      ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=6;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
    });
    ctx.globalAlpha=1;ctx.shadowBlur=0;
  }
}

// ═══════════════════════════════════════════════════════
//  MAIN GAME
// ═══════════════════════════════════════════════════════
class CyberRunner {
  constructor(){
    this.GY=282; this.PW=50; this.PH=100; this.DH=55; this.DO=45;
    this.bg=new ParallaxBg();
    this.fx=new Particles();
    this.sdk=null;
    this.state='start';
    this.biomeIdx=0;
    this._reset();
  }

  _reset(){
    this.player={x:100,y:this.GY,vy:0,jumps:2,duck:false,wasG:true};
    this.score=0; this.speed=4.5; this.frame=0;
    this.obs=[]; this.cols=[];
    this.combo=0; this.comboT=0;
    this.cpop={text:'',al:0,y:200};
    this.shield=false; this.shT=0; this.shA=0;
    this.deathFlash=0;
    // Speed boost
    this.boost=false; this.boostT=0; this.boostCooldown=0;
    this.screenBlur=0;
    // Boss wave
    this.bossActive=false; this.bossHP=0; this.bossMaxHP=0;
    this.bossX=900; this.bossPhase=0; this.bossTimer=0;
    this.bossWave=false; // режим волны перед боссом
    this.nextBossAt=600; // метры
    this.bossWarning=0;
    // Biome
    this.biomeIdx=0;
    this.bg.biomeKey=BIOME_ORDER[0];
    this.lastBiomeChange=0;
    // Leaderboard
    this.newRecordPos=-1;
  }

  get biome(){ return BIOMES[BIOME_ORDER[this.biomeIdx]]; }

  async init(){
    try{this.sdk=new OpenGameSDK({ui:{usePointsWidget:true}});await this.sdk.init({gameId:'490fd052-a2d3-43f8-989b-d10133cf7097'});}catch(e){this.sdk=null;}
    this._spawnLoop();
    this._loop();
  }

  // ── SPAWN ──────────────────────────────────────────
  _spawnLoop(){
    if(this.state==='play'&&!this.bossActive&&!this.bossWave) this._spawnObj();
    const delay=Math.max(550,1200-Math.floor(this.score/300)*22);
    setTimeout(()=>this._spawnLoop(),delay);
  }
  _spawnObj(){
    const r=Math.random();
    const B=this.biome;
    if(r>.55) this.obs.push({type:'ground',x:800,y:this.GY-50,w:45,h:70});
    if(r>.78) this.obs.push({type:'low',   x:800,y:this.GY-28,w:55,h:35});
    if(r>.87) this.obs.push({type:'drone', x:800,y:130+Math.random()*90,w:40,h:28});
    if(r>.60) this.cols.push({type:'coin', x:800,y:120+Math.random()*150,w:22,h:22});
    if(r>.91&&!this.shield) this.cols.push({type:'shield',x:800,y:150+Math.random()*100,w:28,h:28});
    // Speed boost powerup
    if(r>.94&&!this.boost&&this.boostCooldown<=0)
      this.cols.push({type:'boost',x:800,y:160+Math.random()*80,w:28,h:28});
  }

  // ── INPUT ──────────────────────────────────────────
  handleInput(e){
    if(e.type==='touchstart')e.preventDefault();
    AC.resume();
    const k=e.key;
    if(this.state==='start'){this.state='play';return;}
    if(this.state==='dead'){
      if(k===' '||k==='Enter'||e.type==='touchstart'){this._reset();this.state='play';}
      return;
    }
    if(k==='Escape'||k==='p'||k==='P'){
      this.state=this.state==='play'?'pause':'play';snd('pause');return;
    }
    if(this.state==='pause')return;
    if((k===' '||k==='ArrowUp'||e.type==='touchstart')&&this.player.jumps>0){
      this.player.vy=-17;this.player.jumps--;
      snd('jump');
      const h=this._hb();this.fx.emit(h.x+h.w/2,h.y+h.h,'jump',[this.biome.accent,'#fff']);
    }
    if(k==='ArrowDown')this.player.duck=true;
  }

  _hb(){
    return this.player.duck
      ?{x:this.player.x+5,y:this.player.y+this.DO,w:this.PW-8,h:this.DH}
      :{x:this.player.x+5,y:this.player.y,w:this.PW-8,h:this.PH};
  }
  _hit(a,b){return!(a.x+a.w<b.x||a.x>b.x+b.w||a.y+a.h<b.y||a.y>b.y+b.h);}
  _mult(){return this.combo>=10?3:this.combo>=6?2:this.combo>=3?1.5:1;}

  // ── UPDATE ─────────────────────────────────────────
  update(){
    if(this.state!=='play')return;
    this.frame++;
    const dist=Math.floor(this.score/8);

    // ── Biome transition ──
    if(dist-this.lastBiomeChange>=BIOME_DIST){
      const nextIdx=(this.biomeIdx+1)%BIOME_ORDER.length;
      this.biomeIdx=nextIdx;
      this.bg.startTransition(BIOME_ORDER[nextIdx]);
      this.lastBiomeChange=dist;
      snd('biome');
    }

    // ── Boss warning ──
    if(!this.bossActive&&!this.bossWave&&dist>=this.nextBossAt-50&&dist<this.nextBossAt){
      this.bossWarning=Math.max(this.bossWarning,1);
    }
    if(!this.bossActive&&!this.bossWave&&dist>=this.nextBossAt){
      this._startBossWave();
    }

    // ── Physics ──
    this.player.vy+=.85; this.player.y+=this.player.vy;
    if(this.player.y>=this.GY){
      if(!this.player.wasG)this.fx.emit(this.player.x+this.PW/2,this.GY+this.PH,'land',[this.biome.accent]);
      this.player.y=this.GY;this.player.vy=0;this.player.jumps=2;this.player.wasG=true;
    }else this.player.wasG=false;

    // ── Timers ──
    if(this.comboT>0)this.comboT--;else this.combo=0;
    if(this.cpop.al>0){this.cpop.al-=.022;this.cpop.y-=.5;}
    if(this.shield){this.shT--;this.shA+=.05;if(this.shT<=0)this.shield=false;}
    if(this.deathFlash>0)this.deathFlash--;
    if(this.boostCooldown>0)this.boostCooldown--;
    if(this.boost){
      this.boostT--;this.screenBlur=Math.min(this.screenBlur+.5,8);
      if(this.boostT<=0){this.boost=false;this.boostCooldown=360;}
    }else{
      this.screenBlur=Math.max(this.screenBlur-.3,0);
    }
    if(this.bossWarning>0)this.bossWarning-=.015;

    const spd=this.boost?this.speed*1.8:this.speed;
    const hb=this._hb();

    // ── Boss logic ──
    if(this.bossActive) this._updateBoss(hb,spd);

    // ── Obstacles ──
    for(let i=this.obs.length-1;i>=0;i--){
      this.obs[i].x-=spd;
      if(this.obs[i].x<-80){this.obs.splice(i,1);continue;}
      if(this._hit(hb,this.obs[i])){
        if(this.shield){
          this.shield=false;snd('shield');
          this.fx.emit(hb.x+hb.w/2,hb.y+hb.h/2,'shield');
          this.obs.splice(i,1);
        }else{this._die();return;}
      }
    }

    // ── Collectibles ──
    for(let i=this.cols.length-1;i>=0;i--){
      this.cols[i].x-=spd;
      if(this.cols[i].x<-50){this.cols.splice(i,1);continue;}
      const c=this.cols[i];
      if(this._hit(hb,c)){
        if(c.type==='shield'){
          this.shield=true;this.shT=300;snd('shield');
          this.fx.emit(c.x+c.w/2,c.y+c.h/2,'shield');
        }else if(c.type==='boost'){
          this.boost=true;this.boostT=200;snd('boost');
          this.fx.emit(c.x+c.w/2,c.y+c.h/2,'boost');
        }else{
          this.combo++;this.comboT=110;
          const m=this._mult(),pts=Math.round(80*m);
          this.score+=pts;if(this.sdk)this.sdk.addPoints(pts);
          snd(this.combo>=3?'combo':'collect');
          this.fx.emit(c.x+c.w/2,c.y+c.h/2,'collect',[this.biome.accent,'#FFD700']);
          if(this.combo>=3)this.fx.emit(hb.x+hb.w/2,hb.y,'combo');
          this.cpop={text:this.combo>=2?`COMBO ×${this._mult().toFixed(1)}`:'',al:1.5,y:hb.y-15};
        }
        this.cols.splice(i,1);
      }
    }

    if(this.frame%5===0&&this.sdk)this.sdk.addPoints(3);
    this.score+=1;
    this.speed=4.5+Math.floor(this.score/500)*.22;

    this.bg.update(spd);
    this.fx.update();
  }

  // ── BOSS ───────────────────────────────────────────
  _startBossWave(){
    this.bossWave=true;
    this.obs=[];this.cols=[];
    snd('boss');
    // Волна из 5 препятствий
    let delay=0;
    const waveObs=[
      {type:'ground',x:800,  y:this.GY-50,w:45,h:70},
      {type:'drone', x:900,  y:150,w:40,h:28},
      {type:'low',   x:1000, y:this.GY-28,w:55,h:35},
      {type:'ground',x:1100, y:this.GY-50,w:45,h:70},
      {type:'drone', x:1200, y:160,w:40,h:28},
    ];
    waveObs.forEach(o=>{setTimeout(()=>{if(this.state==='play')this.obs.push(o);},delay+=500);});
    setTimeout(()=>{
      if(this.state==='play'){
        this.bossWave=false;
        this._spawnBoss();
      }
    },3500);
  }

  _spawnBoss(){
    this.bossActive=true;
    this.bossHP=this.bossMaxHP=12+Math.floor(this.score/3000)*4;
    this.bossX=900;this.bossPhase=0;this.bossTimer=0;
    this.nextBossAt+=500;
    snd('boss',.7);
  }

  _updateBoss(hb,spd){
    this.bossTimer++;this.bossPhase=(this.bossTimer/60)%(Math.PI*2);

    // Движение: залетает, потом ходит
    if(this.bossX>580)this.bossX-=3.5;
    const bossY=180+Math.sin(this.bossPhase)*40;
    const bossW=80,bossH=70;

    // Атаки: периодически выстреливает снаряд
    if(this.bossTimer%90===0){
      this.obs.push({type:'proj',x:this.bossX,y:bossY+bossH/2-10,w:22,h:16,vx:-6.5});
    }
    // Пули летят быстрее
    for(let i=this.obs.length-1;i>=0;i--){
      if(this.obs[i].type==='proj'){
        this.obs[i].x+=this.obs[i].vx||0;
      }
    }

    // Хитбокс босса
    const bobj={x:this.bossX,y:bossY,w:bossW,h:bossH};

    // Игрок прыгает на босса = урон
    if(this._hit(hb,bobj)&&this.player.vy>2&&!this.player.wasG){
      this.bossHP--;
      this.player.vy=-13;
      snd('hit');
      this.fx.emit(this.bossX+bossW/2,bossY,'boss');
      if(this.bossHP<=0)this._killBoss();
      return;
    }

    // Коллизия (сбоку) без щита = смерть
    if(this._hit(hb,bobj)){
      if(this.shield){this.shield=false;snd('shield');this.fx.emit(hb.x+hb.w/2,hb.y+hb.h/2,'shield');}
      else{this._die();return;}
    }

    // Сохраняем Y для отрисовки
    this._bossY=bossY;this._bossW=bossW;this._bossH=bossH;
  }

  _killBoss(){
    const hb=this._hb();
    this.fx.emit(this.bossX+40,this._bossY+35,'boss');
    this.fx.emit(this.bossX+40,this._bossY+35,'death');
    snd('boss',1.4);
    const bonus=500+Math.floor(this.score/1000)*200;
    this.score+=bonus;if(this.sdk)this.sdk.addPoints(bonus);
    this.bossActive=false;
    // Показ бонуса
    this.cpop={text:`BOSS DEFEATED! +${bonus}`,al:2.5,y:hb.y-30};
  }

  _die(){
    this.state='dead';this.deathFlash=14;
    snd('death');
    const hb=this._hb();this.fx.emit(hb.x+hb.w/2,hb.y+hb.h/2,'death');
    if(this.sdk)this.sdk.endGame();
    const dist=Math.floor(this.score/8);
    this.newRecordPos=LB.add(dist);
  }

  // ── DRAW ───────────────────────────────────────────
  draw(){
    ctx.clearRect(0,0,800,400);
    this.bg.draw();
    this.fx.draw();
    if(this.state==='start'){this._drawStart();return;}

    // Motion blur при boost
    if(this.screenBlur>1){
      ctx.fillStyle=`rgba(0,0,0,${this.screenBlur*.03})`;
      ctx.fillRect(0,0,800,400);
      // Скоростные линии
      ctx.strokeStyle=`rgba(255,150,0,${this.screenBlur*.07})`;
      ctx.lineWidth=1;
      for(let i=0;i<12;i++){
        const ly=50+Math.random()*300,len=60+Math.random()*120;
        ctx.beginPath();ctx.moveTo(800,ly);ctx.lineTo(800-len,ly+Math.random()*4-2);ctx.stroke();
      }
    }

    if(this.deathFlash>0){ctx.fillStyle=`rgba(255,0,80,${this.deathFlash/14*.55})`;ctx.fillRect(0,0,800,400);}

    // Boss warning flash
    if(this.bossWarning>0){
      ctx.fillStyle=`rgba(255,0,0,${Math.sin(Date.now()/80)*.15*this.bossWarning})`;
      ctx.fillRect(0,0,800,400);
    }

    this._drawObs();
    this._drawCols();
    if(this.bossActive)this._drawBoss();
    this._drawPlayer();
    this._drawHUD();
    if(this.state==='pause')this._drawPause();
    if(this.state==='dead') this._drawDead();
  }

  _drawPlayer(){
    const hb=this._hb();
    const cx=hb.x+hb.w/2,cy=hb.y+hb.h/2;
    const B=this.biome;

    if(this.shield){
      const p=.7+.3*Math.sin(this.shA*3);
      ctx.save();ctx.globalAlpha=.3*p;
      ctx.fillStyle='#00FFFF';ctx.shadowColor='#00FFFF';ctx.shadowBlur=28;
      ctx.beginPath();ctx.ellipse(cx,cy,hb.w*.9,hb.h*.62,0,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=1;ctx.strokeStyle='#00FFFF';ctx.lineWidth=2;ctx.shadowBlur=14;ctx.stroke();
      ctx.restore();
    }
    if(this.boost){
      // Огненный шлейф
      ctx.save();
      for(let i=0;i<5;i++){
        ctx.globalAlpha=(.5-i*.08)*(.7+.3*Math.sin(this.frame*.3+i));
        ctx.fillStyle=i%2===0?'#FF6600':'#FFAA00';ctx.shadowColor='#FF6600';ctx.shadowBlur=12;
        ctx.beginPath();ctx.ellipse(hb.x-i*8+5,cy,hb.w*.4,hb.h*.3*(1-i*.15),0,0,Math.PI*2);ctx.fill();
      }
      ctx.restore();
    }

    // ── Unitree G1 — точные пропорции реального робота ──────────
    // Цвета: белый корпус, чёрные шарниры, оранжевые акценты
    const bx=hb.x, by=hb.y, bw=hb.w, bh=hb.h;
    const lp = this.player.duck ? 0 : (this.frame/7)%(Math.PI*2);

    // Пропорции (от реального G1: ~127см, длинные ноги, компактный торс)
    const cx = bx + bw/2;
    // секции по высоте
    const headH  = bh * 0.13;
    const neckH  = bh * 0.04;
    const torsoH = bh * 0.26;
    const waistH = bh * 0.05;
    const hipH   = bh * 0.07;
    const thighH = bh * 0.20;
    const shinH  = bh * 0.18;
    const footH  = bh * 0.07;

    const headY  = by;
    const neckY  = headY  + headH;
    const torsoY = neckY  + neckH;
    const waistY = torsoY + torsoH;
    const hipY   = waistY + waistH;
    const thighY = hipY   + hipH;
    const kneeY  = thighY + thighH;
    const footY  = kneeY  + shinH;

    // Анимация бега: фазы для ног и рук
    const run   = Math.sin(lp);
    const runB  = Math.sin(lp + Math.PI);
    const legSwing  = run  * 10;   // горизонтальное смещение голеней
    const legSwingB = runB * 10;
    const kneeAngle = Math.max(0, run)  * 8; // подъём колена
    const kneeAngleB= Math.max(0, runB) * 8;

    ctx.save();

    if(this.player.duck){
      // ── DUCK: G1 приседает — торс вперёд, ноги согнуты ──────
      const dby = by + bh*0.45; // нижняя точка приседа
      const dtY = dby - bh*0.22;
      // Торс наклонён
      ctx.fillStyle='#e8e8e8';
      ctx.beginPath();
      ctx.moveTo(cx-bw*0.28, dtY+bh*0.22);
      ctx.lineTo(cx+bw*0.28, dtY+bh*0.22);
      ctx.lineTo(cx+bw*0.22, dtY);
      ctx.lineTo(cx-bw*0.22, dtY);
      ctx.closePath(); ctx.fill();
      // Грудные пластины
      ctx.fillStyle='#d0d0d0';
      ctx.fillRect(cx-bw*0.2, dtY+2, bw*0.18, bh*0.1);
      ctx.fillRect(cx+bw*0.02, dtY+2, bw*0.18, bh*0.1);
      // Оранжевая полоска
      ctx.fillStyle='#FF6600';ctx.shadowColor='#FF6600';ctx.shadowBlur=6;
      ctx.fillRect(cx-bw*0.25, dtY+bh*0.12, bw*0.5, 3);
      ctx.shadowBlur=0;
      // Голова
      ctx.fillStyle='#e8e8e8';
      ctx.beginPath();ctx.ellipse(cx, dtY-bh*0.06, bw*0.18, bh*0.07, -0.3, 0, Math.PI*2);ctx.fill();
      // Визор
      ctx.fillStyle='#111';ctx.fillRect(cx-bw*0.14, dtY-bh*0.09, bw*0.28, bh*0.05);
      ctx.fillStyle=B.accent;ctx.shadowColor=B.accent;ctx.shadowBlur=8;
      ctx.fillRect(cx-bw*0.12, dtY-bh*0.085, bw*0.24, 3);ctx.shadowBlur=0;
      // Согнутые ноги
      ctx.fillStyle='#222'; // шарниры бёдер
      ctx.beginPath();ctx.arc(cx-bw*0.14,dby-bh*0.06,bh*0.03,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(cx+bw*0.14,dby-bh*0.06,bh*0.03,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#e8e8e8';
      // Бёдра
      ctx.fillRect(cx-bw*0.24,dby-bh*0.08,bw*0.2,bh*0.1);
      ctx.fillRect(cx+bw*0.04,dby-bh*0.08,bw*0.2,bh*0.1);
      // Голени (сильно согнуты)
      ctx.fillStyle='#e8e8e8';
      ctx.fillRect(cx-bw*0.22,dby,bw*0.18,bh*0.1);
      ctx.fillRect(cx+bw*0.04,dby,bw*0.18,bh*0.1);
      // Ступни
      ctx.fillStyle='#111';
      ctx.fillRect(cx-bw*0.26,dby+bh*0.09,bw*0.22,bh*0.04);
      ctx.fillRect(cx+bw*0.04,dby+bh*0.09,bw*0.22,bh*0.04);
      ctx.restore();
      return;
    }

    // ══════════════════════════════════════
    //  FULL RUNNING G1
    // ══════════════════════════════════════

    // 1. НОГИ (рисуем первыми — под телом)
    // Бедренные шарниры
    const hipLx = cx - bw*0.14;
    const hipRx = cx + bw*0.14;

    // Левая нога (фаза A)
    // Бедро
    ctx.fillStyle='#e8e8e8';
    ctx.beginPath();
    ctx.roundRect(hipLx-bw*0.1, thighY-kneeAngle, bw*0.19, thighH, 3);
    ctx.fill();
    // Шарнир колена
    ctx.fillStyle='#222';
    ctx.beginPath();ctx.arc(hipLx-bw*0.01, kneeY-kneeAngle, bh*0.028, 0, Math.PI*2);ctx.fill();
    // Голень (отклоняется назад при беге)
    ctx.fillStyle='#e8e8e8';
    ctx.save();
    ctx.translate(hipLx-bw*0.01, kneeY-kneeAngle);
    ctx.rotate(-legSwing*0.04);
    ctx.fillRect(-bw*0.085, 0, bw*0.17, shinH);
    ctx.restore();
    // Ступня левая
    ctx.fillStyle='#1a1a1a';
    ctx.beginPath();
    ctx.roundRect(hipLx-bw*0.16+legSwing*0.3, footY-kneeAngle+2, bw*0.28, footH, 2);
    ctx.fill();
    // Оранжевый акцент на голени
    ctx.fillStyle='#FF6600';
    ctx.fillRect(hipLx-bw*0.07, kneeY-kneeAngle+shinH*0.3, bw*0.13, 2);

    // Правая нога (фаза B)
    ctx.fillStyle='#e8e8e8';
    ctx.beginPath();
    ctx.roundRect(hipRx-bw*0.09, thighY-kneeAngleB, bw*0.19, thighH, 3);
    ctx.fill();
    // Шарнир колена
    ctx.fillStyle='#222';
    ctx.beginPath();ctx.arc(hipRx+bw*0.01, kneeY-kneeAngleB, bh*0.028, 0, Math.PI*2);ctx.fill();
    // Голень правая
    ctx.fillStyle='#e8e8e8';
    ctx.save();
    ctx.translate(hipRx+bw*0.01, kneeY-kneeAngleB);
    ctx.rotate(-legSwingB*0.04);
    ctx.fillRect(-bw*0.085, 0, bw*0.17, shinH);
    ctx.restore();
    // Ступня правая
    ctx.fillStyle='#1a1a1a';
    ctx.beginPath();
    ctx.roundRect(hipRx-bw*0.08+legSwingB*0.3, footY-kneeAngleB+2, bw*0.28, footH, 2);
    ctx.fill();
    ctx.fillStyle='#FF6600';
    ctx.fillRect(hipRx-bw*0.06, kneeY-kneeAngleB+shinH*0.3, bw*0.13, 2);

    // Бедренные шарниры (круглые, тёмные)
    ctx.fillStyle='#2a2a2a';
    ctx.beginPath();ctx.arc(hipLx, thighY, bh*0.038, 0, Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(hipRx, thighY, bh*0.038, 0, Math.PI*2);ctx.fill();

    // 2. ПОЯС (тонкий шарнир — характерно для G1)
    ctx.fillStyle='#333';
    ctx.beginPath();
    ctx.ellipse(cx, waistY+waistH/2, bw*0.18, waistH/2+1, 0, 0, Math.PI*2);
    ctx.fill();
    // Горизонтальный шарнир пояса
    ctx.fillStyle='#444';
    ctx.fillRect(cx-bw*0.22, waistY+1, bw*0.44, waistH-2);
    ctx.fillStyle='#FF6600';ctx.shadowColor='#FF6600';ctx.shadowBlur=5;
    ctx.fillRect(cx-bw*0.14, waistY+waistH*0.35, bw*0.28, 2);
    ctx.shadowBlur=0;

    // 3. ТОРС
    // Основа торса — белый, слегка трапециевидный
    ctx.fillStyle='#e8e8e8';
    ctx.beginPath();
    ctx.moveTo(cx-bw*0.30, torsoY+torsoH);
    ctx.lineTo(cx+bw*0.30, torsoY+torsoH);
    ctx.lineTo(cx+bw*0.25, torsoY);
    ctx.lineTo(cx-bw*0.25, torsoY);
    ctx.closePath();ctx.fill();
    // Разделительная линия грудных пластин (V-образно, как на G1)
    ctx.strokeStyle='#bbb';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(cx, torsoY+2);ctx.lineTo(cx-bw*0.06, torsoY+torsoH*0.55);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx, torsoY+2);ctx.lineTo(cx+bw*0.06, torsoY+torsoH*0.55);ctx.stroke();
    // Серединный блок (логотип / корпус)
    ctx.fillStyle='#d5d5d5';
    ctx.fillRect(cx-bw*0.12, torsoY+torsoH*0.55, bw*0.24, torsoH*0.35);
    // Светящийся центральный датчик (как у реального G1 — круглый фронтальный сенсор)
    ctx.fillStyle=B.accent;ctx.shadowColor=B.accent;ctx.shadowBlur=12;
    ctx.beginPath();ctx.arc(cx, torsoY+torsoH*0.38, bh*0.028, 0, Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.shadowBlur=4;
    ctx.beginPath();ctx.arc(cx, torsoY+torsoH*0.38, bh*0.012, 0, Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    // Оранжевая полоса по низу торса (характерная деталь G1)
    ctx.fillStyle='#FF6600';ctx.shadowColor='#FF6600';ctx.shadowBlur=6;
    ctx.fillRect(cx-bw*0.26, torsoY+torsoH-4, bw*0.52, 4);
    ctx.shadowBlur=0;
    // Боковые рёбра жёсткости
    ctx.strokeStyle='#ccc';ctx.lineWidth=1;
    ctx.strokeRect(cx-bw*0.22, torsoY+6, bw*0.12, torsoH-14);
    ctx.strokeRect(cx+bw*0.1,  torsoY+6, bw*0.12, torsoH-14);

    // 4. РУКИ
    // Плечевые шарниры (большие круглые — фишка G1)
    const shoulderLx = cx - bw*0.33;
    const shoulderRx = cx + bw*0.33;
    const shoulderY  = torsoY + torsoH*0.08;

    ctx.fillStyle='#2a2a2a';
    ctx.beginPath();ctx.arc(shoulderLx, shoulderY, bh*0.04, 0, Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(shoulderRx, shoulderY, bh*0.04, 0, Math.PI*2);ctx.fill();
    ctx.fillStyle='#444';
    ctx.beginPath();ctx.arc(shoulderLx, shoulderY, bh*0.025, 0, Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(shoulderRx, shoulderY, bh*0.025, 0, Math.PI*2);ctx.fill();

    // Плечо-предплечье левое (качается противофазно ноге)
    const armSwingL = runB * 8;
    const armSwingR = run  * 8;
    const elbowY = shoulderY + torsoH*0.6;

    ctx.fillStyle='#e8e8e8';
    // Верхняя часть руки (плечо)
    ctx.save();
    ctx.translate(shoulderLx, shoulderY);
    ctx.rotate(armSwingL*0.04);
    ctx.beginPath();ctx.roundRect(-bw*0.075, 0, bw*0.14, torsoH*0.55, 3);ctx.fill();
    // Шарнир локтя
    ctx.fillStyle='#2a2a2a';
    ctx.beginPath();ctx.arc(0, torsoH*0.55, bh*0.022, 0, Math.PI*2);ctx.fill();
    // Предплечье
    ctx.fillStyle='#e0e0e0';
    ctx.beginPath();ctx.roundRect(-bw*0.06, torsoH*0.55, bw*0.11, torsoH*0.5, 3);ctx.fill();
    // Кисть (3 пальца — характерно для G1)
    ctx.fillStyle='#333';
    ctx.beginPath();ctx.arc(0, torsoH*0.55+torsoH*0.5, bh*0.022, 0, Math.PI*2);ctx.fill();
    // 3 пальца
    ctx.fillStyle='#555';
    for(let f=-1;f<=1;f++){
      ctx.fillRect(f*bw*0.035-bw*0.015, torsoH*1.06, bw*0.028, bh*0.05);
    }
    ctx.restore();

    // Правая рука
    ctx.fillStyle='#e8e8e8';
    ctx.save();
    ctx.translate(shoulderRx, shoulderY);
    ctx.rotate(-armSwingR*0.04);
    ctx.beginPath();ctx.roundRect(-bw*0.065, 0, bw*0.14, torsoH*0.55, 3);ctx.fill();
    ctx.fillStyle='#2a2a2a';
    ctx.beginPath();ctx.arc(0, torsoH*0.55, bh*0.022, 0, Math.PI*2);ctx.fill();
    ctx.fillStyle='#e0e0e0';
    ctx.beginPath();ctx.roundRect(-bw*0.05, torsoH*0.55, bw*0.11, torsoH*0.5, 3);ctx.fill();
    ctx.fillStyle='#333';
    ctx.beginPath();ctx.arc(0, torsoH*1.05, bh*0.022, 0, Math.PI*2);ctx.fill();
    ctx.fillStyle='#555';
    for(let f=-1;f<=1;f++){
      ctx.fillRect(f*bw*0.035-bw*0.015, torsoH*1.06, bw*0.028, bh*0.05);
    }
    ctx.restore();

    // 5. ШЕЯ
    ctx.fillStyle='#333';
    ctx.fillRect(cx-bw*0.08, neckY, bw*0.16, neckH+2);

    // 6. ГОЛОВА (маленькая, округлая, с широким горизонтальным визором)
    // Основа
    ctx.fillStyle='#e8e8e8';
    ctx.beginPath();
    ctx.roundRect(cx-bw*0.22, headY, bw*0.44, headH, [bh*0.02, bh*0.02, bh*0.01, bh*0.01]);
    ctx.fill();
    // Боковые грани (темнее)
    ctx.fillStyle='#d0d0d0';
    ctx.fillRect(cx-bw*0.22, headY+2, bw*0.04, headH-4);
    ctx.fillRect(cx+bw*0.18, headY+2, bw*0.04, headH-4);
    // Визор — широкая горизонтальная полоса (#ключевая черта G1)
    ctx.fillStyle='#0a0a0f';
    ctx.beginPath();
    ctx.roundRect(cx-bw*0.19, headY+headH*0.2, bw*0.38, headH*0.45, 3);
    ctx.fill();
    // Свечение визора (цвет биома)
    ctx.fillStyle=B.accent;ctx.shadowColor=B.accent;ctx.shadowBlur=14;
    ctx.fillRect(cx-bw*0.17, headY+headH*0.28, bw*0.34, headH*0.28);
    // Блики на визоре
    ctx.fillStyle='rgba(255,255,255,0.15)';ctx.shadowBlur=0;
    ctx.fillRect(cx-bw*0.16, headY+headH*0.29, bw*0.12, headH*0.1);
    // Нижняя полоска головы
    ctx.fillStyle='#FF6600';ctx.shadowColor='#FF6600';ctx.shadowBlur=5;
    ctx.fillRect(cx-bw*0.18, headY+headH*0.78, bw*0.36, 2);
    ctx.shadowBlur=0;
    // Верхушка (характерный "гребень")
    ctx.fillStyle='#d8d8d8';
    ctx.beginPath();
    ctx.roundRect(cx-bw*0.1, headY-bh*0.01, bw*0.2, bh*0.015, 2);
    ctx.fill();

    ctx.restore();
  }

  _drawBoss(){
    const bx=this.bossX,by=this._bossY||180,bw=this._bossW||80,bh=this._bossH||70;
    const B=this.biome;
    const pulse=.7+.3*Math.sin(this.bossPhase*2);
    ctx.save();
    // Тело
    ctx.fillStyle='#1a0010';ctx.shadowColor='#FF0044';ctx.shadowBlur=22*pulse;
    ctx.fillRect(bx,by,bw,bh);
    ctx.strokeStyle='#FF0044';ctx.lineWidth=2.5;ctx.strokeRect(bx,by,bw,bh);
    // Внутренние детали
    ctx.fillStyle='#2a0020';ctx.fillRect(bx+8,by+8,bw-16,bh-16);
    ctx.strokeStyle='rgba(255,0,80,.4)';ctx.lineWidth=1;ctx.strokeRect(bx+10,by+10,bw-20,bh-20);
    // Глаза (мигают при низком HP)
    const eyeAlpha=this.bossHP/this.bossMaxHP<.3?(.5+.5*Math.sin(Date.now()/60)):1;
    ctx.globalAlpha=eyeAlpha;
    ctx.fillStyle='#FF0000';ctx.shadowColor='#FF0000';ctx.shadowBlur=16;
    ctx.beginPath();ctx.arc(bx+22,by+25,7,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(bx+bw-22,by+25,7,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;ctx.shadowBlur=0;
    // Рот
    ctx.strokeStyle='#FF4400';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(bx+bw/2,by+bh-18,14,0,Math.PI);ctx.stroke();
    // HP bar
    const hpPct=this.bossHP/this.bossMaxHP;
    ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(bx,by-18,bw,10);
    ctx.fillStyle=hpPct>.5?'#FF4400':hpPct>.25?'#FF8800':'#FF0000';
    ctx.fillRect(bx,by-18,bw*hpPct,10);
    ctx.strokeStyle='#FF0044';ctx.lineWidth=1;ctx.strokeRect(bx,by-18,bw,10);
    ctx.fillStyle='#fff';ctx.font='bold 9px monospace';ctx.textAlign='center';
    ctx.fillText(`BOSS  ${this.bossHP}/${this.bossMaxHP}`,bx+bw/2,by-9);
    ctx.textAlign='left';
    // Аура вокруг босса
    ctx.globalAlpha=.08*pulse;
    ctx.fillStyle='#FF0044';
    ctx.beginPath();ctx.ellipse(bx+bw/2,by+bh/2,bw*.9,bh*.9,0,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
    ctx.restore();
  }

  _drawObs(){
    const B=this.biome;
    this.obs.forEach(o=>{
      ctx.save();
      if(o.type==='proj'){
        ctx.fillStyle='#FF0044';ctx.shadowColor='#FF0044';ctx.shadowBlur=12;
        ctx.beginPath();ctx.ellipse(o.x+o.w/2,o.y+o.h/2,o.w/2,o.h/2,0,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(o.x+8,o.y+o.h/2,4,0,Math.PI*2);ctx.fill();
      }else if(o.type==='drone'){
        ctx.fillStyle=B.droneCol;ctx.shadowColor=B.droneGlow;ctx.shadowBlur=14;
        ctx.fillRect(o.x,o.y,o.w,o.h);
        ctx.strokeStyle=B.droneGlow;ctx.lineWidth=1.5;ctx.strokeRect(o.x,o.y,o.w,o.h);
        ctx.fillStyle=B.droneGlow;ctx.fillRect(o.x-9,o.y+4,9,3);ctx.fillRect(o.x+o.w,o.y+4,9,3);
        ctx.shadowColor='#ff0055';ctx.shadowBlur=8;ctx.fillStyle='#ff0055';
        ctx.beginPath();ctx.arc(o.x+o.w/2,o.y+o.h/2,5,0,Math.PI*2);ctx.fill();
      }else{
        ctx.fillStyle=B.obsCol;ctx.shadowColor=B.obsGlow;ctx.shadowBlur=12;
        ctx.fillRect(o.x,o.y,o.w,o.h);
        ctx.strokeStyle=B.obsGlow;ctx.lineWidth=1.5;ctx.strokeRect(o.x,o.y,o.w,o.h);
        ctx.strokeStyle=B.obsGlow+'44';ctx.lineWidth=1;
        for(let gy=o.y+10;gy<o.y+o.h-5;gy+=10){ctx.beginPath();ctx.moveTo(o.x+2,gy);ctx.lineTo(o.x+o.w-2,gy);ctx.stroke();}
      }
      ctx.restore();
    });
  }

  _drawCols(){
    const bob=t=>Math.sin(this.frame*.06+t)*4;
    const B=this.biome;
    this.cols.forEach(c=>{
      ctx.save();
      const cx=c.x+c.w/2,cy=c.y+c.h/2+bob(c.x*.01);
      if(c.type==='shield'){
        ctx.shadowColor='#00FFFF';ctx.shadowBlur=18;
        ctx.fillStyle='rgba(0,255,255,0.18)';ctx.strokeStyle='#00FFFF';ctx.lineWidth=2;
        ctx.beginPath();
        for(let a=0;a<6;a++){const ang=(a/6)*Math.PI*2-Math.PI/2,r=c.w/2;
          a===0?ctx.moveTo(cx+r*Math.cos(ang),cy+r*Math.sin(ang)):ctx.lineTo(cx+r*Math.cos(ang),cy+r*Math.sin(ang));}
        ctx.closePath();ctx.fill();ctx.stroke();
        ctx.fillStyle='#00FFFF';ctx.font='bold 12px monospace';ctx.textAlign='center';ctx.fillText('S',cx,cy+4);
      }else if(c.type==='boost'){
        // Треугольник молнии
        ctx.shadowColor='#FF6600';ctx.shadowBlur=20;
        ctx.fillStyle='rgba(255,100,0,0.2)';
        ctx.beginPath();ctx.arc(cx,cy,c.w/2+3,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#FF6600';ctx.strokeStyle='#FFAA00';ctx.lineWidth=2;
        ctx.beginPath();ctx.moveTo(cx,cy-c.h/2);ctx.lineTo(cx+c.w/2,cy+c.h/2);ctx.lineTo(cx-c.w/2,cy+c.h/2);ctx.closePath();
        ctx.fill();ctx.stroke();
        ctx.fillStyle='#fff';ctx.font='bold 13px monospace';ctx.textAlign='center';ctx.fillText('⚡',cx,cy+5);
      }else{
        ctx.shadowColor='#FFD700';ctx.shadowBlur=14;
        ctx.fillStyle='#FFD700';ctx.beginPath();ctx.arc(cx,cy,c.w/2,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#cc8800';ctx.beginPath();ctx.arc(cx,cy,c.w/2-3,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#FFD700';ctx.font='bold 10px monospace';ctx.textAlign='center';ctx.fillText('$',cx,cy+4);
      }
      ctx.restore();
    });
  }

  _drawHUD(){
    const dist=Math.floor(this.score/8);
    const B=this.biome;

    // Score / biome block
    ctx.fillStyle='rgba(0,0,0,.55)';ctx.fillRect(10,10,215,82);
    ctx.strokeStyle=B.accent+'55';ctx.lineWidth=1;ctx.strokeRect(10,10,215,82);
    ctx.fillStyle=B.accent;ctx.font='bold 11px monospace';ctx.fillText('DISTANCE',20,27);
    ctx.font='bold 30px monospace';ctx.fillText(`${dist}m`,20,58);
    ctx.fillStyle='#666';ctx.font='10px monospace';ctx.fillText(`SPD ${(this.boost?this.speed*1.8:this.speed).toFixed(1)}`,20,75);
    // Biome name
    ctx.fillStyle=B.accent+'aa';ctx.font='bold 10px monospace';ctx.fillText(B.name,115,27);
    // Best
    const best=LB.best();
    if(best>0){ctx.fillStyle='#FFD70088';ctx.font='10px monospace';ctx.fillText(`BEST ${best}m`,115,45);}
    // Combo
    if(this.combo>=2){
      const m=this._mult();
      ctx.fillStyle=m>=2?'#FFD700':'#FF00FF';
      ctx.font=`bold ${12+this.combo}px monospace`;
      ctx.fillText(`×${m.toFixed(1)} COMBO`,115,62);
    }

    // Boost bar
    if(this.boost){
      const pct=this.boostT/200;
      ctx.fillStyle='rgba(255,100,0,.15)';ctx.fillRect(620,10,170,36);
      ctx.strokeStyle='#FF6600';ctx.lineWidth=1.5;ctx.strokeRect(620,10,170,36);
      ctx.fillStyle='#FF6600';ctx.font='bold 12px monospace';ctx.fillText(`⚡ BOOST  ${Math.ceil(this.boostT/60)}s`,630,31);
      ctx.fillStyle='rgba(255,100,0,.4)';ctx.fillRect(620,46,170*pct,5);
    }
    // Shield bar
    if(this.shield){
      const pct=this.shT/300;
      const top=this.boost?54:10;
      ctx.fillStyle='rgba(0,255,255,.12)';ctx.fillRect(620,top,170,36);
      ctx.strokeStyle='#00FFFF';ctx.lineWidth=1.5;ctx.strokeRect(620,top,170,36);
      ctx.fillStyle='#00FFFF';ctx.font='bold 12px monospace';ctx.fillText(`🛡 SHIELD  ${Math.ceil(this.shT/60)}s`,630,top+21);
      ctx.fillStyle='rgba(0,255,255,.3)';ctx.fillRect(620,top+30,170*pct,5);
    }

    // Boss warning
    if(this.bossWarning>0){
      ctx.globalAlpha=this.bossWarning;
      ctx.fillStyle='#FF0044';ctx.font='bold 16px monospace';ctx.textAlign='center';
      if(Math.floor(Date.now()/300)%2===0)ctx.fillText('⚠ BOSS INCOMING ⚠',400,380);
      ctx.textAlign='left';ctx.globalAlpha=1;
    }

    // Combo popup
    if(this.cpop.al>0&&this.cpop.text){
      ctx.globalAlpha=Math.min(this.cpop.al,1);
      ctx.fillStyle='#FFD700';ctx.font='bold 17px monospace';
      ctx.shadowColor='#FFD700';ctx.shadowBlur=14;ctx.textAlign='center';
      ctx.fillText(this.cpop.text,this.player.x+30,this.cpop.y);
      ctx.textAlign='left';ctx.shadowBlur=0;ctx.globalAlpha=1;
    }
  }

  _drawStart(){
    ctx.fillStyle='rgba(0,0,0,.58)';ctx.fillRect(0,0,800,400);
    ctx.textAlign='center';
    ctx.shadowColor='#00FF9F';ctx.shadowBlur=32;
    ctx.fillStyle='#00FF9F';ctx.font='bold 52px monospace';ctx.fillText('UNITREE G1',400,120);
    ctx.shadowColor='#FF00FF';ctx.shadowBlur=22;
    ctx.fillStyle='#FF00FF';ctx.font='bold 28px monospace';ctx.fillText('CYBER RUNNER',400,162);
    ctx.shadowBlur=0;

    // Control box
    ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(200,180,400,130);
    ctx.strokeStyle='rgba(0,255,159,.25)';ctx.lineWidth=1;ctx.strokeRect(200,180,400,130);
    ctx.fillStyle='#aaa';ctx.font='13px monospace';
    ctx.fillText('SPACE / ↑  — прыжок (двойной!)',400,203);
    ctx.fillText('↓          — присесть',400,223);
    ctx.fillText('P / ESC    — пауза',400,243);
    ctx.fillStyle='rgba(255,100,0,.7)';
    ctx.fillText('⚡ = Speed Boost   S = Щит',400,263);
    ctx.fillStyle='rgba(255,0,68,.8)';
    ctx.fillText('каждые 500м — БОСС! прыгай на него!',400,283);
    ctx.fillStyle='rgba(0,255,159,.5)';ctx.font='11px monospace';
    ctx.fillText('3 биома: Киберполис → Завод → Космос',400,304);

    // Leaderboard
    const lb=LB.top();
    if(lb.length>0){
      ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(580,10,210,lb.length*22+30);
      ctx.strokeStyle='rgba(255,215,0,.3)';ctx.lineWidth=1;ctx.strokeRect(580,10,210,lb.length*22+30);
      ctx.fillStyle='#FFD700';ctx.font='bold 11px monospace';ctx.textAlign='left';ctx.fillText('🏆 TOP RUNS',590,28);
      lb.forEach((e,i)=>{
        ctx.fillStyle=i===0?'#FFD700':i<3?'#aaa':'#666';
        ctx.font=`${i===0?'bold ':''}11px monospace`;
        ctx.fillText(`${i+1}. ${e.d}m`,590,50+i*22);
      });
      ctx.textAlign='center';
    }

    if(Math.floor(Date.now()/500)%2===0){
      ctx.shadowColor='#00FF9F';ctx.shadowBlur=10;
      ctx.fillStyle='#00FF9F';ctx.font='bold 16px monospace';
      ctx.fillText('[ НАЖМИ ЛЮБУЮ КЛАВИШУ ]',400,360);ctx.shadowBlur=0;
    }
    ctx.textAlign='left';
  }

  _drawPause(){
    ctx.fillStyle='rgba(0,0,0,.62)';ctx.fillRect(0,0,800,400);
    ctx.textAlign='center';
    ctx.shadowColor='#00FFFF';ctx.shadowBlur=22;
    ctx.fillStyle='#00FFFF';ctx.font='bold 50px monospace';ctx.fillText('PAUSE',400,188);
    ctx.shadowBlur=0;ctx.fillStyle='#888';ctx.font='16px monospace';ctx.fillText('P / ESC — продолжить',400,228);
    ctx.textAlign='left';
  }

  _drawDead(){
    ctx.fillStyle='rgba(0,0,0,.7)';ctx.fillRect(0,0,800,400);
    ctx.textAlign='center';
    ctx.shadowColor='#FF00FF';ctx.shadowBlur=32;
    ctx.fillStyle='#FF00FF';ctx.font='bold 52px monospace';ctx.fillText('GAME OVER',400,130);
    ctx.shadowBlur=0;
    const dist=Math.floor(this.score/8);
    ctx.fillStyle='#00FF9F';ctx.font='bold 28px monospace';ctx.fillText(`${dist}м`,400,175);

    // Leaderboard
    const lb=LB.top();
    if(lb.length>0){
      ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(230,192,340,lb.length*24+28);
      ctx.strokeStyle='rgba(255,215,0,.4)';ctx.lineWidth=1;ctx.strokeRect(230,192,340,lb.length*24+28);
      ctx.fillStyle='#FFD700';ctx.font='bold 13px monospace';ctx.fillText('🏆 ТАБЛИЦА РЕКОРДОВ',400,212);
      lb.forEach((e,i)=>{
        const isNew=i===this.newRecordPos;
        ctx.fillStyle=isNew?'#FFD700':i===0?'#FFD700':i<3?'#aaa':'#666';
        ctx.font=`${isNew||i===0?'bold ':''}12px monospace`;
        const label=isNew?`► ${i+1}. ${e.d}м  ◄`:`${i+1}. ${e.d}м`;
        ctx.fillText(label,400,232+i*24);
      });
    }

    ctx.fillStyle='#888';ctx.font='13px monospace';
    ctx.fillText(`Биом: ${this.biome.name}   Скорость: ${this.speed.toFixed(1)}   ×${this._mult().toFixed(1)} комбо`,400,332);
    if(Math.floor(Date.now()/600)%2===0){
      ctx.shadowColor='#00FF9F';ctx.shadowBlur=8;
      ctx.fillStyle='#00FF9F';ctx.font='bold 16px monospace';
      ctx.fillText('ПРОБЕЛ / ENTER — заново',400,368);ctx.shadowBlur=0;
    }
    ctx.textAlign='left';
  }

  _loop(){this.update();this.draw();requestAnimationFrame(()=>this._loop());}
}

// ── Bootstrap ─────────────────────────────────────────
const game=new CyberRunner();
game.init();
document.addEventListener('keydown',e=>{
  if([' ','ArrowUp','ArrowDown'].includes(e.key))e.preventDefault();
  game.handleInput(e);
});
document.addEventListener('keyup',e=>{if(e.key==='ArrowDown')game.player.duck=false;});
canvas.addEventListener('touchstart',e=>{e.preventDefault();game.handleInput(e);},{passive:false});
</script>
